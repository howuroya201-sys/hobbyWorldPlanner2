<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Green gradients for 3D tube effect -->
    <linearGradient id="greenStem" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="50%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="greenTopLoop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="40%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="greenBottomLoop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="50%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#14532D"/>
    </linearGradient>

    <!-- Halo gold gradient -->
    <linearGradient id="goldHalo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF08A"/>
      <stop offset="30%" stop-color="#FACC15"/>
      <stop offset="70%" stop-color="#EAB308"/>
      <stop offset="100%" stop-color="#CA8A04"/>
    </linearGradient>

    <!-- Gold rays gradient -->
    <linearGradient id="goldRay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="100%" stop-color="#CA8A04"/>
    </linearGradient>

    <!-- Drop shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
    <filter id="haloGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#ca8a04" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Golden Sun Rays and Dots above halo -->
  <g filter="url(#haloGlow)">
    <!-- Small dots -->
    <circle cx="20" cy="148" r="7" fill="#EAB308"/>
    <circle cx="480" cy="70" r="6" fill="#EAB308"/>

    <!-- Rays around halo top -->
    <rect x="48" y="72" width="10" height="28" rx="5" fill="url(#goldRay)" transform="rotate(-65 53 86)"/>
    <rect x="122" y="44" width="10" height="30" rx="5" fill="url(#goldRay)" transform="rotate(-38 127 59)"/>
    <rect x="202" y="10" width="10" height="32" rx="5" fill="url(#goldRay)" transform="rotate(-12 207 26)"/>
    <rect x="282" y="8" width="10" height="32" rx="5" fill="url(#goldRay)" transform="rotate(12 287 24)"/>
    <rect x="350" y="10" width="10" height="30" rx="5" fill="url(#goldRay)" transform="rotate(38 355 25)"/>
    <rect x="412" y="16" width="10" height="28" rx="5" fill="url(#goldRay)" transform="rotate(65 417 30)"/>
  </g>

  <!-- Halo BACK arc -->
  <path d="M 70 160 A 190 48 0 0 1 435 80" 
        fill="none" 
        stroke="url(#goldHalo)" 
        stroke-width="28" 
        stroke-linecap="round" 
        filter="url(#haloGlow)" />

  <!-- Letter 'В' - Green 3D Balloon body -->
  <g filter="url(#shadow)">
    <!-- Stem / Back spine of B -->
    <path d="M 185 130 Q 170 300 175 440" 
          fill="none" 
          stroke="url(#greenStem)" 
          stroke-width="48" 
          stroke-linecap="round" />

    <!-- Bottom loop of 'В' -->
    <path d="M 175 270 C 270 240 400 270 380 370 C 360 450 240 465 175 440" 
          fill="none" 
          stroke="url(#greenBottomLoop)" 
          stroke-width="48" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>

    <!-- Top loop of 'В' -->
    <path d="M 185 130 C 260 80 380 100 370 190 C 360 260 250 270 175 270" 
          fill="none" 
          stroke="url(#greenTopLoop)" 
          stroke-width="48" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>

  <!-- Halo FRONT arc (overlaps over the green top loop) -->
  <path d="M 435 80 A 190 48 0 0 1 70 160" 
        fill="none" 
        stroke="url(#goldHalo)" 
        stroke-width="28" 
        stroke-linecap="round" 
        filter="url(#haloGlow)" />

  <!-- Inner highlight ring for 3D sheen on Halo -->
  <path d="M 428 78 A 185 45 0 0 1 77 158" 
        fill="none" 
        stroke="#FEF08A" 
        stroke-width="6" 
        stroke-linecap="round" 
        opacity="0.85"/>
</svg>
